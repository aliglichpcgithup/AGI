<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSIDIAN 11.1 | Management Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00ffa3;
            --danger: #ff4d4d;
            --bg: #020203;
            --sidebar: #060608;
            --panel: rgba(13, 13, 18, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px 15px; z-index: 100;
        }
        .brand { font-weight: 800; font-size: 18px; color: var(--accent); letter-spacing: 2px; margin-bottom: 35px; text-align: center; }
        
        .btn-init {
            background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px;
            font-weight: 800; cursor: pointer; margin-bottom: 25px; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; letter-spacing: 1px; width: 100%;
        }
        .btn-init:hover { box-shadow: 0 0 20px rgba(0, 255, 163, 0.3); transform: translateY(-2px); }

        /* Chat List & Management */
        .history { flex: 1; overflow-y: auto; padding-right: 5px; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 8px;
            font-size: 13px; border: 1px solid transparent; transition: 0.2s;
            background: rgba(255,255,255,0.02); group;
        }
        .history-item:hover { background: rgba(255,255,255,0.05); }
        .history-item.active { background: rgba(0, 255, 163, 0.08); border-color: rgba(0, 255, 163, 0.2); }
        
        .chat-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .btn-del {
            opacity: 0; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; border: none; background: transparent; color: #666; cursor: pointer;
            transition: 0.2s; font-size: 16px; margin-left: 10px;
        }
        .history-item:hover .btn-del { opacity: 1; }
        .btn-del:hover { background: var(--danger); color: white; }

        /* Main Core */
        .core { flex: 1; display: flex; flex-direction: column; position: relative; }
        .quantum-line { height: 2px; background: var(--accent); width: 0%; position: absolute; top: 0; transition: 0.5s; z-index: 200; }

        .viewport { flex: 1; overflow-y: auto; padding: 50px; }
        .msg-container { max-width: 1000px; margin: 0 auto 40px; }
        
        .bubble { padding: 30px; border-radius: 20px; line-height: 1.8; font-size: 15px; }
        .user-msg { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); align-self: flex-end; }
        .agi-msg { background: var(--panel); border: 1px solid var(--border); width: 100%; border-left: 3px solid var(--accent); }

        pre { 
            background: #000 !important; padding: 25px; border-radius: 12px; 
            margin: 20px 0; border: 1px solid rgba(0, 255, 163, 0.1); overflow: auto;
            position: relative; max-height: 900px; font-family: 'JetBrains Mono', monospace;
        }
        code { color: #a5f3fc; font-size: 13.5px; }
        .copy-btn {
            position: absolute; top: 12px; right: 12px; background: rgba(0, 255, 163, 0.1);
            color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px;
            border-radius: 6px; font-size: 10px; cursor: pointer;
        }

        /* Footer */
        .footer { padding: 0 50px 50px; }
        .input-nexus {
            max-width: 1000px; margin: 0 auto; background: var(--panel);
            border: 1px solid var(--border); border-radius: 20px;
            padding: 15px 25px; display: flex; align-items: flex-end; gap: 15px;
        }
        textarea {
            flex: 1; background: transparent; border: none; color: #fff;
            outline: none; font-size: 16px; resize: none; max-height: 350px; padding: 5px 0;
        }
        .dispatch-btn { background: var(--accent); width: 45px; height: 45px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">OBSIDIAN 11.1</div>
        <button class="btn-init" onclick="spawnNew()">+ NEW ARCHITECTURE</button>
        <div class="history" id="chat-list"></div>
    </aside>

    <main class="core">
        <div id="q-line" class="quantum-line"></div>
        <div class="viewport" id="viewport"></div>

        <div class="footer">
            <form id="q-form" class="input-nexus">
                <textarea id="q-input" rows="1" placeholder="Запрос на код... (TAB отправить)"></textarea>
                <button type="submit" class="dispatch-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </form>
        </div>
    </main>

    <script>
        const API_KEY = "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";
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";

        let archive = JSON.parse(localStorage.getItem('obsidian_chats')) || [];
        let activeId = localStorage.getItem('obsidian_active_id') || null;

        const view = document.getElementById('viewport');
        const input = document.getElementById('q-input');
        const form = document.getElementById('q-form');
        const line = document.getElementById('q-line');

        // ГОРЯЧИЕ КЛАВИШИ
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                if (e.shiftKey) {
                    const start = input.selectionStart;
                    input.value = input.value.substring(0, start) + "\t" + input.value.substring(input.selectionEnd);
                    input.selectionEnd = start + 1;
                } else {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });

        input.oninput = () => {
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        };

        function spawnNew() {
            const id = Date.now();
            archive.push({ 
                id, 
                title: "New Logic", 
                messages: [{ 
                    role: "system", 
                    content: "Ты — Obsidian 11.1. На запрос КОДА отвечай листингом в 1000+ строк. На приветствие отвечай кратко. Не используй сокращения в коде." 
                }] 
            });
            openChat(id);
        }

        function openChat(id) {
            activeId = id;
            localStorage.setItem('obsidian_active_id', id);
            save();
            renderList();
            renderMessages();
        }

        function deleteChat(e, id) {
            e.stopPropagation();
            if (!confirm("Удалить этот чат?")) return;
            
            archive = archive.filter(c => c.id !== id);
            if (activeId == id) {
                activeId = archive.length > 0 ? archive[0].id : null;
            }
            if (!activeId) spawnNew();
            else openChat(activeId);
        }

        function save() {
            localStorage.setItem('obsidian_chats', JSON.stringify(archive));
        }

        function renderList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            archive.forEach(c => {
                const item = document.createElement('div');
                item.className = `history-item ${c.id == activeId ? 'active' : ''}`;
                item.onclick = () => openChat(c.id);
                
                item.innerHTML = `
                    <span class="chat-title">${c.title}</span>
                    <button class="btn-del" onclick="deleteChat(event, ${c.id})">×</button>
                `;
                list.appendChild(item);
            });
        }

        function renderMessages() {
            view.innerHTML = '';
            const current = archive.find(c => c.id == activeId);
            if (current) current.messages.forEach(m => {
                if (m.role !== 'system') drawBubble(m.content, m.role);
            });
            view.scrollTop = view.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            const chat = archive.find(c => c.id == activeId);
            drawBubble(text, 'user');
            chat.messages.push({ role: "user", content: text });
            
            input.value = '';
            input.style.height = 'auto';
            line.style.width = '40%';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: chat.messages,
                        temperature: 0.1, 
                        max_tokens: 8192,
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let output = "";
                const bubble = drawBubble("", 'assistant');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const l of lines) {
                        if (l.startsWith('data: ')) {
                            if (l.includes('[DONE]')) break;
                            try {
                                const json = JSON.parse(l.replace('data: ', ''));
                                const token = json.choices[0].delta.content;
                                if (token) {
                                    output += token;
                                    bubble.innerHTML = marked.parse(output);
                                    setupTools(bubble);
                                    if(view.scrollHeight - view.clientHeight <= view.scrollTop + 500) view.scrollTop = view.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                chat.messages.push({ role: "assistant", content: output });
                if (chat.title === "New Logic") chat.title = text.substring(0, 20);
                save();
                line.style.width = '0%';
                renderList();
            } catch (err) { line.style.width = '0%'; }
        };

        function drawBubble(content, role) {
            const container = document.createElement('div');
            container.className = 'msg-container';
            const div = document.createElement('div');
            div.className = `bubble ${role === 'user' ? 'user-msg' : 'agi-msg'}`;
            div.innerHTML = marked.parse(content);
            container.appendChild(div);
            view.appendChild(container);
            if(role === 'assistant') setupTools(div);
            return div;
        }

        function setupTools(el) {
            el.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const b = document.createElement('button');
                b.className = 'copy-btn'; b.innerText = 'COPY';
                b.onclick = () => {
                    navigator.clipboard.writeText(pre.querySelector('code').innerText);
                    b.innerText = 'DONE'; setTimeout(() => b.innerText = 'COPY', 2000);
                };
                pre.appendChild(b);
            });
        }

        if (archive.length === 0) spawnNew();
        else openChat(activeId || archive[0].id);
    </script>
</body>
</html>
